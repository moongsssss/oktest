<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b",
                        "background-light": "#f1f5f9",
                    },
                    fontFamily: {
                        "sans": ["Pretendard", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <title>OKPOS 가맹점 서류 제출</title>
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            font-family: 'Pretendard', sans-serif;
        }
        .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
        .card-reveal { animation: revealUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased text-slate-900">
    <div class="relative flex h-full min-h-[750px] w-full flex-col max-w-md bg-white shadow-[0_30px_100px_rgba(0,0,0,0.1)] overflow-hidden md:rounded-[3rem]">
        
        <!-- Header -->
        <header class="sticky top-0 z-50 flex items-center bg-white/90 backdrop-blur-xl p-6 justify-center border-b border-slate-100">
            <h1 class="text-lg font-black tracking-tight italic uppercase">OKPOS <span class="not-italic text-primary">Merchant Portal</span></h1>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto px-6 py-8">
            <div class="mb-10 text-center card-reveal" style="animation-delay: 0s;">
                <h2 class="text-3xl font-black leading-tight text-slate-900">신청 시작하기</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">사업자 유형을 선택하여 계속 진행해 주세요.</p>
            </div>

            <div class="space-y-5">
                <!-- Individual Business Card -->
                <a href="./Individual/index.html" class="card-reveal group block rounded-[2.5rem] bg-white border-2 border-blue-100 p-7 hover:border-blue-500 transition-all shadow-sm hover:shadow-xl active-scale" style="animation-delay: 0.1s;">
                    <div class="flex justify-between items-center mb-4">
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[11px] font-black uppercase tracking-widest rounded-full">Individual</span>
                        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                    </div>
                    <div class="space-y-1 mb-6">
                        <h3 class="text-2xl font-black text-slate-900">개인사업자</h3>
                        <p class="text-slate-500 text-sm font-medium">1인 기업 및 일반 과세자</p>
                    </div>
                    <div class="flex items-center gap-1 text-blue-600 font-black text-sm uppercase tracking-widest">
                        신청하기 <span>→</span>
                    </div>
                </a>

                <!-- Corporate Business Card -->
                <a href="./Corporation/index.html" class="card-reveal group block rounded-[2.5rem] bg-white border-2 border-orange-100 p-7 hover:border-orange-500 transition-all shadow-sm hover:shadow-xl active-scale" style="animation-delay: 0.2s;">
                    <div class="flex justify-between items-center mb-4">
                        <span class="px-3 py-1 bg-orange-50 text-orange-600 text-[11px] font-black uppercase tracking-widest rounded-full">Corporation</span>
                        <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                    </div>
                    <div class="space-y-1 mb-6">
                        <h3 class="text-2xl font-black text-slate-900">법인사업자</h3>
                        <p class="text-slate-500 text-sm font-medium">국내외 중대형 및 상장 법인</p>
                    </div>
                    <div class="flex items-center gap-1 text-orange-600 font-black text-sm uppercase tracking-widest">
                        신청하기 <span>→</span>
                    </div>
                </a>

                <!-- Non-profit Card -->
                <a href="./project비영리단체/index.html" class="card-reveal group block rounded-[2.5rem] bg-white border-2 border-purple-100 p-7 hover:border-purple-500 transition-all shadow-sm hover:shadow-xl active-scale" style="animation-delay: 0.3s;">
                    <div class="flex justify-between items-center mb-4">
                        <span class="px-3 py-1 bg-purple-50 text-purple-600 text-[11px] font-black uppercase tracking-widest rounded-full">Non-Profit</span>
                        <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-purple-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                    </div>
                    <div class="space-y-1 mb-6">
                        <h3 class="text-2xl font-black text-slate-900">비영리단체</h3>
                        <p class="text-slate-500 text-sm font-medium">사회적 기업 및 종교/공공 기관</p>
                    </div>
                    <div class="flex items-center gap-1 text-purple-600 font-black text-sm uppercase tracking-widest">
                        신청하기 <span>→</span>
                    </div>
                </a>
            </div>

            <!-- Security Info -->
            <div class="mt-12 p-6 rounded-[2rem] bg-slate-900 text-white shadow-xl card-reveal" style="animation-delay: 0.4s;">
                <div class="flex items-start gap-4">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shrink-0">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <div>
                        <p class="text-base font-black italic">Safe & Secure</p>
                        <p class="text-[11px] text-slate-400 mt-1 leading-relaxed break-keep font-medium">입력하신 모든 정보는 암호화되어 안전하게 처리되며 가맹 신청 목적으로만 사용됩니다.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
