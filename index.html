<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKPOS 가맹점 신청 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 fade-in">
        
        <!-- 개인사업자 선택 카드 -->
        <a href="./Individual/index.html" class="group relative bg-white rounded-[3rem] p-10 md:p-16 flex flex-col items-center text-center transition-all hover:shadow-[0_0_50px_rgba(59,130,246,0.3)] hover:-translate-y-2 active-scale overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full -mr-10 -mt-10 transition-transform group-hover:scale-150 duration-700"></div>
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mb-8">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-4">개인사업자</h2>
            <p class="text-slate-500 text-lg font-medium break-keep">대표자 본인이 직접 운영하는<br>개인 사업자 전용 신청 폼입니다.</p>
            <div class="mt-10 px-8 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-200">신청하기 ➔</div>
        </a>

        <!-- 법인사업자 선택 카드 -->
        <a href="./Corporation/index.html" class="group relative bg-slate-800 rounded-[3rem] p-10 md:p-16 flex flex-col items-center text-center transition-all hover:shadow-[0_0_50px_rgba(255,255,255,0.1)] hover:-translate-y-2 active-scale overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 transition-transform group-hover:scale-150 duration-700"></div>
            <div class="w-20 h-20 bg-slate-700 text-slate-300 rounded-3xl flex items-center justify-center mb-8">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            </div>
            <h2 class="text-3xl md:text-4xl font-black text-white mb-4">법인사업자</h2>
            <p class="text-slate-400 text-lg font-medium break-keep">법인 등기가 완료된<br>법인 사업체 전용 신청 폼입니다.</p>
            <div class="mt-10 px-8 py-4 bg-white text-slate-900 font-black rounded-2xl shadow-lg">신청하기 ➔</div>
        </a>

    </div>

    <!-- 로고 하단 배치 -->
    <div class="absolute bottom-10 text-white/30 font-black text-xl tracking-widest italic uppercase fade-in" style="animation-delay: 0.5s">OKPOS Registration System</div>

</body>
</html>
